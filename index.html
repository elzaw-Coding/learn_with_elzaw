<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/png">
    <title>Elzaw || Learnly Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Elzaw Learnly Pro</h1>

    <div class="input-group">
        <div id="toast" class="toast"></div>
        <input type="text" id="term" onblur="app.autoTranslate()" placeholder="أدخل الكلمة هنا"> <button
            class="btn-secondary" onclick="app.autoTranslate()">ترجمة تلقائية 🤖</button>
        <input type="text" id="trans" placeholder="الترجمة (المعنى)...">
        <button class="btn-main" onclick="app.addEntry()">إضافة للقاموس</button>
    </div>

    <div style="display: flex; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 20px;">
        <button class="btn-secondary" style="background:#475569; flex:1;" onclick="app.exportData()">📤 تصدير
            البيانات</button>
        <button class="btn-secondary" style="background:#475569; flex:1;"
            onclick="document.getElementById('fileInput').click()">📥 استيراد البيانات</button>
        <input type="file" id="fileInput" style="display:none" onchange="app.importData(event)">
    </div>

    <div class="tabs">
        <div class="tab-btn active" id="tabDaily" onclick="app.switchTab('daily')">الحصيلة</div>
        <div class="tab-btn" id="tabHard" onclick="app.switchTab('hard')">الصعبة</div>
    </div>

    <div id="displayArea" style="width:100%; max-width:500px;"></div>

    <div id="testArea">
        <div class="test-container" id="testBox"></div>
    </div>
    <div id="confirmModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>تأكيد الحذف</h3>
            <p>هل أنت متأكد من حذف هذه الكلمة؟</p>
            <div class="modal-actions">
                <button id="confirmBtn" class="btn-danger">حذف</button>
                <button id="cancelBtn" class="btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
